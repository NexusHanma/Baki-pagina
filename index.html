<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baki Hanma - Web Oficial</title>
    
    <link rel="icon" type="image/png" href="img/favicon.png">

    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        @font-face {
            font-family: 'MiFuenteBaki'; 
            src: url('fonts/Baki-Font.ttf'); 
        }

        /* === 🛑 ESTILOS GENERALES Y FONDO (ACTUALIZADO CON FLEXBOX) 🛑 === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-image: url('img/fondo-baki.png'); 
            background-size: cover; 
            background-position: center center; 
            background-attachment: fixed; 
            background-color: #050505; 
            font-family: 'Arial Black', Impact, sans-serif; 
            color: white; 
            overflow-x: hidden; 
            /* 🔥 LA MAGIA CONTRA EL FOOTER FLOTANTE 🔥 */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        .contenedor-central { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        header { padding-top: 30px; }
        main { flex: 1; }

        /* === 3. BARRA DE NAVEGACIÓN === */
        .barra-roja { 
            background-color: #000000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 45px; 
            border-top: 2px solid white; 
            border-bottom: 2px solid white; 
            position: relative; 
            z-index: 100; 
        }
        
        .caja-logo { position: absolute; left: 10px; top: -25px; width: 100px; height: 80px; display: flex; align-items: center; justify-content: center; }
        .caja-logo img { max-width: 90%; height: auto; border: 0; }
        
        nav ul { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; align-items: center; }
        
        nav ul li a { 
            text-decoration: none; 
            color: white; 
            font-size: 20px; 
            text-transform: uppercase; 
            font-family: 'Oswald', sans-serif; 
            font-weight: 500;
            transition: color 0.3s ease; 
        }

        nav ul li a:hover {
            color: #e31b23;
        }

        nav ul li:not(:last-child):after {
            content: "|"; 
            color: white;
            margin-left: 20px; 
            font-size: 20px;
        }
        
        .caja-iconos { position: absolute; right: 20px; display: flex; gap: 15px; align-items: center; }
        .caja-iconos img { width: 25px; height: 25px; cursor: pointer; border: 0; }

        /* 🛒 CARRITO ESTILO PERSISTENTE */
        .carrito-contenedor { position: relative; display: flex; align-items: center; justify-content: center; }
        .contador-carrito { 
            position: absolute; top: -8px; right: -8px; 
            background-color: #e31b23; color: white; 
            font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: bold; 
            width: 18px; height: 18px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            border: 1px solid white; opacity: 0; transition: 0.3s; 
            transform: scale(0.5); pointer-events: none; 
        }
        .contador-carrito.visible { opacity: 1; transform: scale(1); }

        /* === 2. SECCIÓN HERO === */
        .hero { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; height: 250px; }
        .hero-izq { width: 45%; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
        .hero-izq img { max-width: 100%; height: auto; display: block; border: 0; } 
        
        .caja-boton { 
            background-color: #f8f8f8; 
            color: black; 
            font-size: 20px; 
            text-align: center; 
            padding: 10px 0; 
            border-radius: 25px; 
            width: 80%; 
            cursor: pointer; 
            transition: 0.2s; 
            font-family: 'Oswald', sans-serif; 
            font-weight: 700;
        }
        .caja-boton:hover { background-color: #e31b23; color: white; }
        
        /* SLIDER */
        .hero-der { width: 50%; position: relative; display: flex; align-items: center; justify-content: center; }
        .contenedor-cinta { width: 100%; overflow: hidden; border: 2px solid #222; }
        .cinta-imagenes { display: flex; width: 100%; }
        .cinta-imagenes img { width: 100%; flex-shrink: 0; display: block; border: 0; } 
        
        .flecha-slider { position: absolute; top: 50%; background-color: white; border: none; width: 30px; height: 30px; cursor: pointer; clip-path: polygon(100% 50%, 0 0, 0 100%); z-index: 10; }
        .flecha-izq { left: -15px; transform: translateY(-50%) rotate(180deg); }
        .flecha-der { right: -15px; transform: translateY(-50%); }

        /* === 3. BANNER CENTRAL === */
        .banner-central { margin-top: 60px; display: flex; justify-content: space-between; align-items: center; gap: 20px; border-top: 2px solid white; border-bottom: 2px solid white; padding: 20px 0; }
        .banner-perfil { width: 30%; display: flex; align-items: center; justify-content: center; }
        
        .banner-perfil img { 
            width: 100%; 
            height: auto; 
            border: 0; 
            transition: filter 0.3s ease, transform 0.1s ease; 
        } 
        
        .banner-perfil img:hover { 
            filter: drop-shadow(0px 0px 15px rgba(255, 0, 0, 0.9)); 
            cursor: pointer; 
        }
        
        .banner-perfil img:active {
            transform: scale(1.1); 
        }

        .banner-pregunta { width: 35%; display: flex; align-items: center; justify-content: center; }
        .banner-pregunta img { width: 100%; height: auto; border: 0; }

        /* === 4. SECCIÓN INFERIOR === */
        .seccion-inferior { display: flex; margin-top: 60px; gap: 40px; margin-bottom: 60px; }
        .col-personajes { width: 55%; }
        .titulo-seccion, .titulo-peleas { 
            background-color: #e31b23; color: white; text-align: center; padding: 5px; margin-bottom: 20px; border-radius: 5px; text-transform: uppercase; font-family: 'Oswald', sans-serif; font-weight: 700;
        }
        .grid-personajes { display: flex; justify-content: space-between; gap: 20px; }
        .tarjeta-personaje { width: 31%; height: 200px; border: 2px solid white; display: flex; flex-direction: column; background-color: #000; }
        .nombre-personaje { background-color: #e31b23; text-align: center; padding: 3px; font-size: 13px; text-transform: uppercase; font-family: 'Oswald', sans-serif; }
        .foto-personaje { flex-grow: 1; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .foto-personaje img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }

        .col-peleas { width: 45%; }
        .titulo-peleas { border-radius: 20px; }
        .grid-peleas { display: flex; justify-content: space-between; gap: 10px; }
        .tarjeta-pelea { width: 32%; height: 120px; border: 2px solid white; display: flex; align-items: center; justify-content: center; overflow: hidden; background-color: #000; }
        .tarjeta-pelea img { width: 100%; height: 100%; object-fit: cover; }
        
        /* === PILARES === */
        .pilar-izq { position: fixed; top: 0; left: 0; height: 100vh; width: 200px; background-image: url('img/pilar-izq.png'); background-size: cover; z-index: -1; }
        .pilar-der { position: fixed; top: 0; right: 0; height: 100vh; width: 200px; background-image: url('img/pilar-der.png'); background-size: cover; z-index: -1; }
        
        /* === EFECTOS VISUALES === */
        .tarjeta-personaje, .tarjeta-pelea {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .tarjeta-personaje:hover, .tarjeta-pelea:hover {
            transform: scale(1.05); 
            box-shadow: 0px 10px 20px rgba(255, 0, 0, 0.5); 
            cursor: pointer; 
        }
        
        /* === Formulario === */
        .seccion-contacto-minimalista {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center; 
            padding: 30px 0; 
            margin-top: 40px; 
            position: relative;
            z-index: 10;
        }

        .seccion-contacto-minimalista h2 {
            font-family: 'MiFuenteBaki', serif; 
            color: #ff0000;
            margin-bottom: 20px;
            font-size: 24px;
            letter-spacing: 2px;
            text-align: center;
            text-shadow: 2px 2px 4px #000;
        }

        .formulario-cuadritos {
            display: flex;
            flex-direction: row; 
            gap: 15px; 
            align-items: center;
        }

        .cuadrito-blanco {
            background-color: white !important; 
            color: black !important; 
            border: 1px solid #ddd; 
            border-radius: 5px; 
            font-size: 16px;
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        input.cuadrito-blanco {
            width: 250px; 
            padding: 12px;
            text-align: center; 
        }

        input.cuadrito-blanco::placeholder { color: #888; }
        input.cuadrito-blanco:focus { box-shadow: 0 0 8px rgba(255, 0, 0, 0.4); border-color: #ff0000; }

        button.cuadrito-blanco {
            width: 120px; 
            padding: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            text-align: center;
            border-radius: 5px; 
        }

        button.cuadrito-blanco:hover {
            background-color: #f0f0f0 !important; 
            transform: scale(1.03); 
        }

        .formulario-baki-final {
            width: 100%; 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        /* === MENSAJE FLOTANTE === */
        #mensaje-team {
            position: fixed;
            top: -100px; 
            left: 50%;
            transform: translateX(-50%);
            background-color: #000000; 
            color: #ffffff;
            font-family: 'Oswald', sans-serif;
            font-size: 35px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 15px 40px;
            border: 0px solid white;
            border-radius: 10px;
            z-index: 10000; 
            transition: top 0.3s ease-out; 
            pointer-events: none;
            letter-spacing: 2px;
        }

        #mensaje-team.mostrar { top: 40px; }
        
       /* =======================================================
           🥊 MODO CELULAR (DISEÑO ULTRA COMPACTO) 🥊
           ======================================================= */
        @media (max-width: 768px) {
            
            /* 1. Ocultamos los pilares */
            .pilar-izq, .pilar-der { display: none; }

            /* 2. Barra de navegación SÚPER COMPACTA */
            .barra-roja { 
                flex-direction: column; 
                height: auto; 
                padding: 8px 0; 
                gap: 5px; 
            }
            
            .caja-logo { position: relative; top: 0; left: 0; height: auto; margin-bottom: 2px;}
            .caja-logo img { width: 60px; height: auto; } 

            nav ul { 
                flex-wrap: wrap; 
                justify-content: center; 
                gap: 2px 15px; 
                padding: 0 5px;
            }
            
            nav ul li a { 
                font-size: 12px; 
                background-color: transparent; 
                padding: 2px 0; 
                border: none; 
                display: inline-block;
                letter-spacing: 0.5px;
                color: #ddd; 
            }

            nav ul li a:hover { color: #e31b23; }
            nav ul li:not(:last-child):after { display: none; }

            .caja-iconos { position: relative; right: 0; margin-top: 2px; gap: 20px; }
            .caja-iconos img { width: 22px; height: 22px; }

            /* 3. Ajustes para que el resto del contenido también sea compacto */
            .hero { flex-direction: column; height: auto; gap: 20px; margin-top: 15px; }
            .hero-izq, .hero-der { width: 100%; }
            .caja-boton { width: 90%; font-size: 16px; padding: 8px 0; }

            /* 4. Banner Central */
            .banner-central { flex-direction: column; gap: 15px; margin-top: 40px;}
            .banner-perfil, .banner-pregunta { width: 80%; }

            /* 5. Sección Inferior */
            .seccion-inferior { flex-direction: column; margin-top: 30px; }
            .col-personajes, .col-peleas { width: 100%; }
            .grid-personajes, .grid-peleas { flex-direction: column; align-items: center; gap: 15px; }
            .tarjeta-personaje, .tarjeta-pelea { width: 100%; margin-bottom: 0; }
        }
       
        /* === EASTER EGG === */
        .overlay-personaje {
            position: fixed; 
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(0, 0, 0, 0.95); 
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; 
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.3s ease; 
        }

        .overlay-personaje img {
            max-width: 85%; max-height: 85%; object-fit: contain;
            border: 5px solid #ff0000; 
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.7); 
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }

        .mostrar-animacion { animation: secuenciaEpica 4s ease-in-out forwards; }
        .mostrar-animacion img { animation: secuenciaImagenEpica 4s ease-in-out forwards; }

        @keyframes secuenciaEpica {
            0% { opacity: 0; pointer-events: none; }
            10% { opacity: 1; pointer-events: auto; } 
            90% { opacity: 1; pointer-events: auto; } 
            100% { opacity: 0; pointer-events: none; } 
        }

        @keyframes secuenciaImagenEpica {
            0% { transform: scale(0.5); }
            10% { transform: scale(1); } 
            90% { transform: scale(1.03); } 
            100% { transform: scale(1.2); } 
        }
    </style>
</head>

<body>
    <div class="pilar-izq"></div>
    <div class="pilar-der"></div>

    <header>
        <div class="contenedor-central">
            <div class="barra-roja">
                <div class="caja-logo"><img src="img/logo.png" alt="Logo"></div> 
                <nav>
                    <ul>
                        <li><a href="index.html" style="color: #e31b23;">Inicio</a></li>
                        <li><a href="personajes.html">Personajes</a></li>
                        <li><a href="historia.html">Historia</a></li>
                        <li><a href="mercancia.html">Mercancía</a></li>
                        <li><a href="Peleas.html">Peleas Memorables</a></li>
                    </ul>
                </nav>
                <div class="caja-iconos">
                    <a href="perfil.html"><img src="img/icono-perfil.png" alt="Perfil"></a>
                    <div class="carrito-contenedor">
                        <a href="carrito.html"><img src="img/icono-carrito.png" alt="Carrito"></a>
                        <div class="contador-carrito" id="contadorCarrito">0</div>
                    </div>
                </div>
            </div>

            <div class="hero">
                <div class="hero-izq">
                    <img src="img/Baki ojos.png" alt="Baki" style="width:100%">
                    <div class="caja-boton" onclick="window.location.href='historia.html'">DESCUBRE MÁS</div>
                </div>
                
                <div class="hero-der">
                    <button class="flecha-slider flecha-izq" onclick="cambiarImagen(-1)"></button>
                    <div class="contenedor-cinta">
                        <div class="cinta-imagenes" id="cinta">
                            <img src="img/slider-1.png">
                            <img src="img/slider-2.png">
                            <img src="img/slider-3.png">
                            <img src="img/slider-4.png">
                            <img src="img/slider-5.png">
                            <img src="img/slider-6.png">
                            <img src="img/slider-7.png">
                        </div>
                    </div>
                    <button class="flecha-slider flecha-der" onclick="cambiarImagen(1)"></button>
                </div>
            </div>

            <div class="banner-central">
                <div class="banner-perfil"><img src="img/banner-yujiro.png" alt="Yujiro" onclick="mostrarMensaje('¡Team Yujiro!')"></div>
                <div class="banner-pregunta"><img src="img/texto-fuerte.png" alt="Pregunta"></div>
                <div class="banner-perfil"><img src="img/banner-baki.png" alt="Baki" onclick="mostrarMensaje('¡Team Baki!')"></div>
            </div>

            <div class="seccion-inferior">
                <div class="col-personajes">
                    <div class="titulo-seccion">• PERSONAJES PRINCIPALES •</div>
                    <div class="grid-personajes">
                        <div class="tarjeta-personaje" onclick="window.location.href='personajes.html'">
                            <div class="nombre-personaje">BAKI HANMA</div>
                            <div class="foto-personaje"><img src="img/personaje-1.png" alt="Baki"></div>
                        </div>
                        <div class="tarjeta-personaje" onclick="window.location.href='personajes.html'">
                            <div class="nombre-personaje">YUJIRO HANMA</div>
                            <div class="foto-personaje"><img src="img/personaje-2.png" alt="Yujiro"></div>
                        </div>
                        <div class="tarjeta-personaje" onclick="window.location.href='personajes.html'">
                            <div class="nombre-personaje">BISCUIT OLIVA</div>
                            <div class="foto-personaje"><img src="img/personaje-3.png" alt="Oliva"></div>
                        </div>
                    </div>
                </div>

                <div class="col-peleas">
                    <div class="titulo-peleas">• PELEAS MÁS MEMORABLES •</div>
                    <div class="grid-peleas">
                        <div class="tarjeta-pelea" onclick="window.location.href='Peleas.html'"><img src="img/pelea-1.png" alt="P1"></div>
                        <div class="tarjeta-pelea" onclick="window.location.href='Peleas.html'"><img src="img/pelea-2.png" alt="P2"></div>
                        <div class="tarjeta-pelea" onclick="window.location.href='Peleas.html'"><img src="img/pelea-3.png" alt="P3"></div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="contenedor-central">
        <div class="seccion-contacto-minimalista">
            <h2>¿Saramambiche favorito?</h2>
            <form onsubmit="return activarTruco(event)" class="formulario-cuadritos">
                <input type="text" name="personaje_favorito" placeholder="¿Quién es tu personaje favorito?" required class="cuadrito-blanco">
                <button type="submit" class="cuadrito-blanco">ENVIAR</button>
            </form>
        </div>
    </main>

    <footer style="background-color: #0d0d0d; color: #888; text-align: center; padding: 20px; border-top: 2px solid #ff0000; width: 100%; position: relative; z-index: 10; margin-top: auto;">
        <p>© 2026 Proyecto Baki creado por NexusHanma. Sin reglas, solo código.</p>
    </footer>

    <div id="ee-baki" class="overlay-personaje">
        <img src="img/baki_easter.png" alt="Baki Easter Egg">
    </div>
    <div id="ee-yujiro" class="overlay-personaje">
        <img src="img/yujiro_easter.png" alt="Yujiro Easter Egg">
    </div>
    <div id="ee-oliva" class="overlay-personaje">
        <img src="img/oliva_easter.png" alt="Oliva Easter Egg">
    </div>
    <div id="ee-jack" class="overlay-personaje">
        <img src="img/jack_easter.png" alt="Jack Easter Egg">
    </div>
    <div id="ee-musashi" class="overlay-personaje">
        <img src="img/musashi_easter.png" alt="Musashi Easter Egg">
    </div>
    
    <div id="mensaje-team"></div>

    <script>
        // 🛒 LÓGICA DE SINCRONIZACIÓN DEL CARRITO
        document.addEventListener('DOMContentLoaded', () => {
            const actualizarContadorGlobal = () => {
                const contadorHTML = document.getElementById('contadorCarrito');
                if(!contadorHTML) return;
                const itemsEnStorage = JSON.parse(localStorage.getItem('bakiCartItems')) || [];
                const totalItems = itemsEnStorage.length;

                if (totalItems > 0) {
                    contadorHTML.textContent = totalItems;
                    contadorHTML.classList.add('visible');
                } else {
                    contadorHTML.classList.remove('visible');
                }
            };

            // Ejecutar al cargar la página
            actualizarContadorGlobal();
            
            // Escuchar cambios en otras pestañas
            window.addEventListener('storage', actualizarContadorGlobal);
        });

        function mostrarMensaje(texto) {
            const mensaje = document.getElementById('mensaje-team');
            mensaje.textContent = texto; 
            mensaje.classList.add('mostrar'); 
            setTimeout(() => {
                mensaje.classList.remove('mostrar');
            }, 2000);
        }
        
        const cinta = document.getElementById("cinta");
        let enTransicion = false; 

        function cambiarImagen(direccion) {
            if (enTransicion) return; 
            const imagenes = Array.from(cinta.children).filter(img => img.style.display !== 'none');
            if (imagenes.length <= 1) return; 

            enTransicion = true;
            if (direccion === 1) { 
                cinta.style.transition = "transform 0.5s ease-in-out";
                cinta.style.transform = "translateX(-100%)"; 
                setTimeout(() => {
                    cinta.style.transition = "none"; 
                    cinta.appendChild(imagenes[0]); 
                    cinta.style.transform = "translateX(0)"; 
                    enTransicion = false; 
                }, 500); 
            } else { 
                cinta.style.transition = "none"; 
                cinta.insertBefore(imagenes[imagenes.length - 1], imagenes[0]); 
                cinta.style.transform = "translateX(-100%)"; 
                setTimeout(() => {
                    cinta.style.transition = "transform 0.5s ease-in-out";
                    cinta.style.transform = "translateX(0)"; 
                    enTransicion = false; 
                }, 10);
            }
        }

        function activarTruco(evento) {
            evento.preventDefault(); 
            const cajaInput = document.querySelector('input[name="personaje_favorito"]');
            const textoIngresado = cajaInput.value.toLowerCase().trim(); 

            let contenedorAActivar = null;

            if (textoIngresado.includes('baki')) {
                contenedorAActivar = document.getElementById('ee-baki');
            } 
            else if (textoIngresado.includes('yujiro') || textoIngresado.includes('ogro') || textoIngresado.includes('ogre')) {
                contenedorAActivar = document.getElementById('ee-yujiro');
            } 
            else if (textoIngresado.includes('oliva') || textoIngresado.includes('biscuit') || textoIngresado.includes('unchained')) {
                contenedorAActivar = document.getElementById('ee-oliva');
            } 
            else if (textoIngresado.includes('jack')) {
                contenedorAActivar = document.getElementById('ee-jack');
            } 
            else if (textoIngresado.includes('musashi') || textoIngresado.includes('miyamoto')) {
                contenedorAActivar = document.getElementById('ee-musashi');
            }

            if (contenedorAActivar) {
                contenedorAActivar.classList.remove('mostrar-animacion');
                void contenedorAActivar.offsetWidth; 
                contenedorAActivar.classList.add('mostrar-animacion');
                
                setTimeout(() => {
                    cajaInput.value = '';
                    contenedorAActivar.classList.remove('mostrar-animacion');
                }, 4000); 
                
            } else {
                cajaInput.value = '';
            }
            return false; 
        }
        
        document.addEventListener('keydown', function(event) {
            // Bloquea Ctrl + '+' , Ctrl + '-' y Ctrl + '0'
            if (event.ctrlKey && (event.key === '+' || event.key === '-' || event.key === '0')) {
                event.preventDefault();
            }
        });

        document.addEventListener('wheel', function(event) {
            // Bloquea Ctrl + Rueda del ratón
            if (event.ctrlKey) {
                event.preventDefault();
            }
        }, { passive: false });
        
    </script>
</body>
</html>
